name: Feature request
description: Propose a feature or improvement
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Describe the current pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your proposed behavior/API/UI.
      placeholder: Describe the change you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives did you evaluate?

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: What parts of the system are affected?
      placeholder: Dashboard, workers, Convex schema, APIs, docs, etc.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I can help validate this change if maintainers request testing.
          required: false
