name: Bug report
description: Report a reproducible defect in Social Life Manager
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List clear, minimal steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version/commit
      description: Provide a release tag or commit SHA if known.
      placeholder: main / v0.1.0 / abc1234

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Bun version, Node version, browser, and any deployment details.
      placeholder: |
        - OS:
        - Bun:
        - Node:
        - Browser:

  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste relevant logs/screenshots with secrets redacted.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed secrets and personal data from this report.
          required: true
