appId: com.odogwuhq.desktop
productName: Odogwu HQ
copyright: Copyright © 2026 Marvengrey technologies Nig LTD
publish:
  provider: github
  owner: cybermonkjbot
  repo: lifemanager
  releaseType: release
directories:
  output: dist/desktop
files:
  - package.json
  - src/desktop/**/*
  - dist/connector/**/*
  - public/**/*
  - .next/standalone/**/*
  - "!node_modules/**/*"
  - "!dist/open-source/**/*"
  - "!dist/source-handoff/**/*"
asar: false
icon: public/icons/icon
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
npmRebuild: false
mac:
  category: public.app-category.productivity
  icon: public/icons/icon.icns
  extendInfo:
    NSMicrophoneUsageDescription: Odogwu HQ uses the microphone only when you record a local voice sample.
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
win:
  icon: public/icons/icon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  icon: public/icons/icon.png
  target:
    - AppImage
    - deb
  category: Utility
